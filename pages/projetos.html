<head>
    <meta charset="UTF-8">

    <title>Portifólio JRS</title> 
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- LINK GOOGLE FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- FIM GOOGLE FONTES -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <header>
        <div class="interface">

            <div class="logo">
                <a href="/index.html">
                    <img src="/img/logo.png" alt="Portifólio JRS">
                </a>   
            </div>

            <nav class="menu-desktop">
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/pages/sobre.html">Sobre</a></li>
                    <li><a href="/pages/habilidades.html">Habilidades</a></li>
                    <li><a href="/pages/projetos.html">Projetos</a></li>   
                </ul>
            </nav>

            <div class="menu-hamburger" id="menuHamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="jrs-contato">
                <a href="https://wa.me/5519999464662" target="_blank">
                    <button>Contato</button>
                </a>
            </div>

        </div> 
    </header>

    <!-- Overlay do menu mobile -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <main>
        <section id="projetos" class="projetos">
            <div class="interface">
                <h2 class="titulo"> ALGUNS <span>PROJETOS.</span></h2>
                <div class="flex">
                    <a href="https://jefrodriguess.github.io/PetLife/" target="_blank" class="img-projeto-link">
                        <div class="img-projeto" style="background-image: url(/img/PetLife.png);">
                            <div class="orvelay">PETLIFE</div>
                        </div>
                    </a>
                    <a href="https://suits-react.vercel.app/index.html" target="_blank" class="img-projeto-link">
                        <div class="img-projeto" style="background-image: url(/img/PersonHardman.png);">
                            <div class="orvelay">PEARSON HARDMAN</div>
                        </div>
                    </a>
                    <a href="https://in-decore.vercel.app/" target="_blank" class="img-projeto-link">
                        <div class="img-projeto" style="background-image: url(/img/inDecor.png);">
                            <div class="orvelay">inDecore</div>
                        </div>
                    </a>
                    <a href="https://github.com/jefrodriguess/fioealma.git" target="_blank" class="img-projeto-link">
                        <div class="img-projeto" style="background-image: url(/img/fioealma.png);">
                            <div class="orvelay">FIO E ALMA</div>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- FORMULÁRIO com validação JavaScript -->
        <section class="formulario">
            <div class="interface">
                <h2 class="titulo"> FALE <span>COMIGO.</span></h2>
                <form id="contactForm" novalidate>
                    <div class="form-group">
                        <input type="text" id="nome" placeholder="Qual seu nome?">
                        <span class="error-msg" id="nomeError"></span>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Qual seu e-mail?">
                        <span class="error-msg" id="emailError"></span>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="telefone" placeholder="Qual seu telefone?">
                        <span class="error-msg" id="telefoneError"></span>
                    </div>
                    <div class="form-group">
                        <textarea id="mensagem" placeholder="Digite sua mensagem aqui:"></textarea>
                        <span class="error-msg" id="mensagemError"></span>
                    </div>
                    <!-- botão de enviar -->
                    <div class="jrs-enviar"><input type="submit" value="ENVIAR"></div>
                    <!-- mensagem de sucesso -->
                    <div class="success-msg" id="successMsg">
                        <i class="bi bi-check-circle-fill"></i>
                        <p>Mensagem enviada com sucesso!</p>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="interface">
            <div class="line-footer">
                <div class="flex">
                    <div class="logo">
                        <a href="/index.html">
                            <img src="/img/logo.png" alt="Portifólio JRS">
                        </a> 
                    </div>
                    <div class="jrs-social">
                        <a href="https://www.linkedin.com/in/jefrodriguees/" target="_blank"><button><i class="bi bi-linkedin"></i></button></a>
                        <a href="https://github.com/jefrodriguess" target="_blank"><button><i class="bi bi-github"></i></button></a>
                        <a href="https://www.instagram.com/ojefrodrigues?igsh=MTQxOXJtNW4wM2hzdQ%3D%3D&utm_source=qr" target="_blank"><button><i class="bi bi-instagram"></i></button></a>
                    </div>
                </div>   
            </div>
            
            <div class="line-footer">
                <p><i class="bi bi-envelope-at-fill"></i><a href="mailto:jefersonsrodrigues@outlook.com"></a> jefersonsrodrigues@outlook.com</p>
            </div>
        </div>
    </footer>

    <script src="/js/script.js"></script>
</body>
